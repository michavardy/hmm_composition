[log]
# Set the logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = "DEBUG"

[preprocess]
input_dir = "data/shakespeare-dataset/text"
file_pattern = "*.txt"
encoding = "utf-8"
lowercase = true
keep_punctuation = ".,?'"
normalize_whitespace = true
split_mode = "sentence"
sentence_split_pattern = "(?<=[.!?])\\s+"
line_split_pattern = "\\n+"
token_pattern = "[a-z0-9']+|[.,?]"
min_sequence_length = 1
rare_token_cutoff = 5
max_vocab_size = 10000
special_tokens = ["<PAD>", "<UNK>"]
test_size = 0.2
random_state = 42
shuffle = true
numpy_dtype = "int32"
output_dir = "data/processed"
train_output = "train_sequences.pkl"
test_output = "test_sequences.pkl"
vocab_json_output = "vocab.json"
vocab_pickle_output = "vocab.pkl"
metadata_output = "metadata.pkl"

[training]
processed_dir = "data/processed"
train_data_file = "train_sequences.pkl"
test_data_file = "test_sequences.pkl"
vocab_file = "vocab.pkl"
experiments_dir = "experiments"
seed = 42
wandb_project = "hmm-composition"
wandb_entity = ""
wandb_mode = "offline"

[[training.experiments]]
name = "baseline_n_gram"
model = "n_gram"
enabled = true
max_iteration = 100
delta_likelyhood = 0.001
train_subset = 3000
test_subset = 600
tags = ["baseline", "n_gram"]



