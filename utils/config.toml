[model_hmm]
states = 50
pseudocount = 0.001
random_seed = 42

[model_chmm]
types = 2
states = 3
pseudocount = 0.001
random_seed = 42

[model_fhmm]
chains = 2
states = 2
pseudocount = 0.001
random_seed = 42

[model_f_hmm]
memory_window = 1
states = 3
pseudocount = 0.001
random_seed = 42

[model_switching_hmm]
modes = 2
states = 3
pseudocount = 0.001
random_seed = 42

[model_lstm]
layers = 1
nodes = 64
embedding_dim = 64
learning_rate = 0.001
epochs = 2
dropout = 0.0
bos_token_id = 0
device = "cpu"

[model_n_gram]
k = 3
discount = 0.75
bos_token_id = 0

[dashboard]
host = "127.0.0.1"
port = 8766
port_search_limit = 20
experiments_dir = "experiments"
title = "HMM Composition Experiments"
open_browser = true
open_browser_delay_seconds = 0.5